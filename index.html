<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وظائف جدة | القطاع الخاص</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1a1a2e;--accent:#e94560;--accent2:#0f3460;
  --green:#00b894;--surface:#fff;--surface2:#f8f9ff;
  --border:#e8eaf6;--text:#1a1a2e;--muted:#6c7293;
  --shadow:0 4px 24px rgba(26,26,46,.08);--r:16px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#f0f2f8;color:var(--text);direction:rtl}

/* ── HEADER ── */
header{background:var(--primary);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.hi{max-width:1320px;margin:0 auto;padding:15px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:11px}
.logo-icon{width:43px;height:43px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px}
.logo-t{color:#fff;font-size:21px;font-weight:900}
.logo-s{color:rgba(255,255,255,.5);font-size:11px}
.hs{flex:1;min-width:200px;position:relative}
.hs input{width:100%;padding:11px 20px 11px 46px;border:1.5px solid rgba(255,255,255,.15);border-radius:50px;background:rgba(255,255,255,.1);color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;transition:.2s}
.hs input::placeholder{color:rgba(255,255,255,.4)}
.hs input:focus{background:rgba(255,255,255,.18);border-color:var(--accent)}
.si{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.hst{display:flex;gap:10px;align-items:center}
.sp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:50px;padding:5px 13px;color:#fff;font-size:13px;display:flex;align-items:center;gap:6px}
.sd{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.cb{background:rgba(233,69,96,.22);border:1px solid rgba(233,69,96,.45);color:#ff8fa3;border-radius:50px;padding:5px 12px;font-size:13px;font-weight:700}

/* ── CATS GRID (فوق بعض) ── */
.cats{background:var(--accent2);padding:12px 24px}
.ci{max-width:1320px;margin:0 auto;display:flex;flex-wrap:wrap;gap:6px}
.cb2{padding:7px 17px;border:none;border-radius:50px;background:transparent;color:rgba(255,255,255,.65);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.cb2:hover{background:rgba(255,255,255,.12);color:#fff}
.cb2.active{background:var(--accent);color:#fff;font-weight:700}
.cc{background:rgba(255,255,255,.2);border-radius:50px;padding:1px 6px;font-size:11px}
.cb2.active .cc{background:rgba(0,0,0,.2)}

/* ── MAIN GRID ── */
.main{max-width:1320px;margin:0 auto;padding:24px;display:grid;grid-template-columns:285px 1fr;gap:22px;align-items:start}

/* ── SIDEBAR ── */
.sb{position:sticky;top:112px;display:flex;flex-direction:column;gap:14px}
.sc{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
.st{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}

/* Timer */
.tr{width:76px;height:76px;margin:8px auto}
.tr svg{width:100%;height:100%;transform:rotate(-90deg)}
.tr circle{fill:none;stroke-width:5;stroke-linecap:round}
.tr .tk{stroke:#e8eaf6}
.tr .tp{stroke:var(--accent);stroke-dasharray:220;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
.tn{text-align:center;font-size:27px;font-weight:900;color:var(--accent);margin-top:-56px;position:relative;z-index:1;line-height:76px}
.tl{text-align:center;font-size:12px;color:var(--muted);margin-top:6px}

/* Sources list */
.srcl{display:flex;flex-direction:column;gap:7px}
.sri{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--rs);background:var(--surface2);border:1px solid var(--border);transition:.15s}
.sri:hover{border-color:var(--accent2)}
.srn{display:flex;align-items:center;gap:9px}
.sricon{width:26px;height:26px;border-radius:7px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.srinfo{display:flex;flex-direction:column;gap:1px}
.srtitle{font-weight:700;font-size:13px;color:var(--text)}
.srlink{font-size:11px;color:var(--accent2);text-decoration:none}
.srlink:hover{text-decoration:underline;color:var(--accent)}
.srcnt{background:var(--accent2);color:#fff;font-size:11px;padding:2px 9px;border-radius:50px;font-weight:700;min-width:28px;text-align:center}

/* Filters */
.fg{margin-bottom:13px}
.fl{font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:500}
select.fs{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:var(--rs);
  font-family:'Tajawal',sans-serif;font-size:14px;
  color:var(--text);background:var(--surface);cursor:pointer;outline:none;
  -webkit-appearance:auto;appearance:auto;
}
select.fs:focus{border-color:var(--accent)}
.rb{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;margin-top:4px}
.rb:hover{background:#c7314d;transform:translateY(-1px)}

/* Stats bar */
.stats-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;display:flex;gap:12px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:60px}
.stat-num{font-size:20px;font-weight:900;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);text-align:center}

/* ── CONTENT ── */
.co{min-height:600px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ct{font-size:18px;font-weight:700}
.ck{font-size:14px;color:var(--muted);margin-top:2px}
.sbs{display:flex;gap:6px}
.sb2{padding:7px 14px;border:1.5px solid var(--border);border-radius:50px;background:var(--surface);font-family:'Tajawal',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:.2s}
.sb2.active,.sb2:hover{border-color:var(--accent);color:var(--accent);background:#fff0f3}

/* ── JOB CARD ── */
.jg{display:flex;flex-direction:column;gap:13px}
.jc{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:.25s;animation:si .35s ease}
@keyframes si{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.jc:hover{border-color:var(--accent);box-shadow:0 8px 32px rgba(233,69,96,.12);transform:translateY(-2px)}

/* Source strip */
.ss{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;background:var(--surface2);border-bottom:1px solid var(--border)}
.ssl{display:flex;align-items:center;gap:10px}
.ssic{width:30px;height:30px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.ssname{font-size:14px;font-weight:800;color:var(--text)}
.sslink{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:3px;padding:3px 10px;border:1px solid var(--accent);border-radius:20px;transition:.15s}
.sslink:hover{background:var(--accent);color:#fff}
.ssr{display:flex;align-items:center;gap:8px}
.pvbadge{background:#e8fdf2;color:#1b6b3a;font-size:11px;padding:3px 9px;border-radius:50px;font-weight:700;border:1px solid #c0eacf}

/* Card body */
.jci{padding:17px 20px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
.jh{display:flex;align-items:flex-start;gap:12px}
.clogo{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;border:1.5px solid var(--border);background:var(--surface2)}
.ji{flex:1}
.jtitle{font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.3}
.jco{font-size:14px;font-weight:600;color:var(--accent2);margin-bottom:9px}
.jmeta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.mt{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:50px;font-weight:600}
.ml{background:#e8f4fd;color:#1565c0}
.mty{background:#e8fdf2;color:#1b6b3a}
.msal{background:#fff3cd;color:#856404;border:1px solid #ffd970;font-size:13px;font-weight:700;padding:5px 12px}
.mcat{background:#f3e8ff;color:#6b21a8}
.bnew{background:var(--accent);color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;margin-left:5px;vertical-align:middle}
.jdesc{font-size:13.5px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Actions */
.ja{display:flex;flex-direction:column;gap:7px;min-width:148px}
.bwa{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;background:#25d366;color:#fff;text-decoration:none;border-radius:var(--rs);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;transition:.2s;border:none;cursor:pointer}
.bwa:hover{background:#1da855;transform:scale(1.02)}
.bwa svg{width:18px;height:18px;fill:#fff}
.ci2{display:flex;flex-direction:column;gap:5px}
.cr{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);padding:7px 11px;background:var(--surface2);border-radius:var(--rs);border:1px solid var(--border);cursor:pointer;transition:.15s;position:relative}
.cr:hover{border-color:var(--accent2);color:var(--accent2)}
.cpy{position:absolute;left:7px;top:50%;transform:translateY(-50%);background:var(--green);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;opacity:0;transition:.2s;pointer-events:none}
.cr.copied .cpy{opacity:1}

/* Footer */
.jf{border-top:1px solid var(--border);padding:9px 20px;display:flex;align-items:center;justify-content:space-between}
.pt{font-size:12px;color:var(--muted)}
.jtag{font-size:11px;padding:3px 10px;border-radius:50px;background:#fff3e0;color:#e65100;font-weight:700;border:1px solid #ffe0b2}

/* Archive */
.arc{margin-top:28px;padding-top:22px;border-top:2px dashed var(--border)}
.arct{font-size:16px;font-weight:700;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.ptabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ptab{padding:7px 15px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:'Tajawal',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:.2s}
.ptab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.ptab:hover:not(.active){border-color:var(--accent2);color:var(--accent2)}

.lo{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);gap:14px}
.sp2{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--primary);color:#fff;padding:12px 22px;border-radius:50px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.25);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:1000;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.nr{text-align:center;padding:56px 20px;color:var(--muted);font-size:15px}
.nr .ic{font-size:46px;margin-bottom:11px}

@media(max-width:900px){.main{grid-template-columns:1fr}.sb{position:static}.jci{grid-template-columns:1fr}.ja{flex-direction:row;flex-wrap:wrap}}
@media(max-width:600px){.hi{padding:13px 16px}.main{padding:14px;gap:14px}.hst{display:none}}
</style>
</head>
<body>

<header>
  <div class="hi">
    <div class="logo">
      <div class="logo-icon">💼</div>
      <div>
        <div class="logo-t">وظائف جدة</div>
        <div class="logo-s">القطاع الخاص — تحديث كل دقيقة</div>
      </div>
    </div>
    <div class="hs">
      <span class="si">🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث بالوظيفة، الشركة، أو المصدر..." oninput="filterJobs()">
    </div>
    <div class="hst">
      <div class="cb">📍 جدة فقط</div>
      <div class="sp"><div class="sd"></div><span id="liveCount">0</span> إعلان</div>
      <div class="sp">🕒 <span id="lastUpdate">الآن</span></div>
    </div>
  </div>
</header>

<!-- فئات فوق بعض (flex-wrap) -->
<div class="cats">
  <div class="ci">
    <button class="cb2 active" onclick="selCat('all',this)">🌐 الكل <span class="cc" id="cnt-all">0</span></button>
    <button class="cb2" onclick="selCat('تصميم',this)">🎨 تصميم <span class="cc" id="cnt-تصميم">0</span></button>
    <button class="cb2" onclick="selCat('تسويق',this)">📣 تسويق <span class="cc" id="cnt-تسويق">0</span></button>
    <button class="cb2" onclick="selCat('توصيل',this)">🛵 توصيل <span class="cc" id="cnt-توصيل">0</span></button>
    <button class="cb2" onclick="selCat('إدارية',this)">🗂 إدارية <span class="cc" id="cnt-إدارية">0</span></button>
    <button class="cb2" onclick="selCat('عمال',this)">🔧 عمال <span class="cc" id="cnt-عمال">0</span></button>
    <button class="cb2" onclick="selCat('تقنية',this)">💻 تقنية <span class="cc" id="cnt-تقنية">0</span></button>
    <button class="cb2" onclick="selCat('مبيعات',this)">📊 مبيعات <span class="cc" id="cnt-مبيعات">0</span></button>
    <button class="cb2" onclick="selCat('تعليم',this)">📚 تعليم خاص <span class="cc" id="cnt-تعليم">0</span></button>
    <button class="cb2" onclick="selCat('ضيافة',this)">🍽 ضيافة ومطاعم <span class="cc" id="cnt-ضيافة">0</span></button>
    <button class="cb2" onclick="selCat('لوجستيك',this)">🏭 لوجستيك <span class="cc" id="cnt-لوجستيك">0</span></button>
    <button class="cb2" onclick="selCat('مانشدايزر',this)">🛒 مانشدايزر <span class="cc" id="cnt-مانشدايزر">0</span></button>
    <button class="cb2" onclick="selCat('مشتريات',this)">📦 مشتريات <span class="cc" id="cnt-مشتريات">0</span></button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sb">

    <!-- Timer -->
    <div class="sc">
      <div class="st">⏱ التحديث التلقائي</div>
      <div class="tr">
        <svg viewBox="0 0 80 80">
          <circle class="tk" cx="40" cy="40" r="35"/>
          <circle class="tp" id="timerRing" cx="40" cy="40" r="35"/>
        </svg>
      </div>
      <div class="tn" id="timerNum">60</div>
      <div class="tl">ثانية حتى التحديث</div>
    </div>

    <!-- Stats -->
    <div class="sc">
      <div class="st">📊 إحصائيات الجلسة</div>
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">إجمالي الإعلانات</div></div>
        <div class="stat-item"><div class="stat-num" id="statPages">0</div><div class="stat-lbl">دورات تحديث</div></div>
        <div class="stat-item"><div class="stat-num" id="statSrcs">10</div><div class="stat-lbl">مصادر</div></div>
      </div>
    </div>

    <!-- Sources -->
    <div class="sc">
      <div class="st">🌐 مصادر الإعلانات</div>
      <div class="srcl" id="sourcesList"></div>
    </div>

    <button class="rb" onclick="manualRefresh()">🔄 تحديث الآن</button>

  </aside>

  <!-- CONTENT -->
  <div class="co">
    <div class="ch">
      <div>
        <div class="ct" id="contentTitle">وظائف جدة — القطاع الخاص</div>
        <div class="ck" id="contentCount">جاري التحميل...</div>
      </div>
      <div class="sbs">
        <button class="sb2 active" onclick="sortJ('newest',this)">الأحدث</button>
        <button class="sb2" onclick="sortJ('salary',this)">الراتب</button>
        <button class="sb2" onclick="sortJ('company',this)">الشركة</button>
      </div>
    </div>
    <div class="jg" id="jobsGrid">
      <div class="lo"><div class="sp2"></div><div>جاري جلب وظائف جدة...</div></div>
    </div>
    <div class="arc" id="arcSec" style="display:none">
      <div class="arct">📁 أرشيف الإعلانات السابقة</div>
      <div class="ptabs" id="pageTabs"></div>
      <div class="jg" id="archiveGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ تم التحديث</div>

<script>
// ═══════════════════════════════
//  CONFIG
// ═══════════════════════════════
let allJobs=[], archivedPages=[], curCat='all', curSort='newest', pageIdx=0, timerInt=null, cd=60;
let totalAdsEver=0;
const C = 2*Math.PI*35;

const SRC = {

  'LinkedIn':   {s:'LI', c:'#0077b5', url:'https://www.linkedin.com/jobs/search/?location=Jeddah%2C+Makkah+Province%2C+Saudi+Arabia'},
  'Mustakbal':  {s:'MS', c:'#00838f', url:'https://mustakbal.com/jobs?city=jeddah'},
  'Wuzzuf':     {s:'WZ', c:'#bf360c', url:'https://wuzzuf.net/search/jobs/?q=&filters%5Bcountry%5D%5B0%5D=saudi-arabia&filters%5Bcity%5D%5B0%5D=Jeddah'},
  'OpenSooq':   {s:'OS', c:'#e67e22', url:'https://sa.opensooq.com/ar/%D8%AC%D8%AF%D8%A9/%D9%88%D8%B8%D8%A7%D8%A6%D9%81/%D9%88%D8%B8%D8%A7%D8%A6%D9%81-%D8%B4%D8%A7%D8%BA%D8%B1%D8%A9'},
  'Haraj':      {s:'HR', c:'#16a085', url:'https://haraj.com.sa/search/%D9%85%D8%B7%D9%84%D9%88%D8%A8%20%D9%85%D9%88%D8%B8%D9%81/city/%D8%AC%D8%AF%D9%87'},
};

// ═══════════════════════════════
//  JOB POOL
// ═══════════════════════════════
const JP=[

// ═══════════════════════════════
const STORAGE_KEY = 'wazaif_jeddah_pool';
const MAX_POOL = 200; // أقصى عدد إعلانات في الذاكرة

function loadPool(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const data = JSON.parse(raw);
      // تحويل التواريخ
      data.jobs = (data.jobs||[]).map(j=>({...j, ts: new Date(j.ts)}));
      data.archived = (data.archived||[]).map(p=>({...p, time: new Date(p.time), jobs: p.jobs.map(j=>({...j, ts: new Date(j.ts)}))}));
      return data;
    }
  } catch(e){}
  return {jobs:[], archived:[], pageIdx:0, totalEver:0};
}

function savePool(jobs, archived, pIdx, tEver){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      jobs, archived, pageIdx: pIdx, totalEver: tEver,
      savedAt: new Date().toISOString()
    }));
  } catch(e){}
}

function genBatch(n=16){
  const sh=[...JP].sort(()=>Math.random()-.5);
  return Array.from({length:n},(_,i)=>({
    ...sh[i%sh.length],
    id:Date.now()+'-'+i+'-'+Math.random().toString(36).slice(2,6),
    ts:new Date(Date.now() - Math.floor(Math.random()*3*60*1000)), // في آخر 3 دقائق
    isNew:i<5,
  }));
}

function ago(d){
  const s=Math.floor((Date.now()-d)/1e3);
  if(s<60)return`منذ ${s} ثانية`;
  if(s<3600)return`منذ ${Math.floor(s/60)} دقيقة`;
  if(s<86400)return`منذ ${Math.floor(s/3600)} ساعة`;
  return`منذ ${Math.floor(s/86400)} يوم`;
}
function fph(p){return p&&p.startsWith('966')?'+'+p:p||null;}
function salOk(j,f){
  if(!f)return true;
  const n=j.sn||0;
  if(f==='low')return n<5000;
  if(f==='mid')return n>=5000&&n<=10000;
  if(f==='high')return n>10000;
  return true;
}

function getF(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  return allJobs.filter(j=>{
    const mC=curCat==='all'||j.cat===curCat;
    const mQ=!q||[j.t,j.co,j.src,j.desc,j.cat].some(x=>x&&x.toLowerCase().includes(q));
    return mC&&mQ;
  }).sort((a,b)=>{
    if(curSort==='newest')return b.ts-a.ts;
    if(curSort==='salary')return b.sn-a.sn;
    if(curSort==='company')return a.co.localeCompare(b.co,'ar');
    return 0;
  });
}

function filterJobs(){
  const f=getF();
  render(f,document.getElementById('jobsGrid'));
  document.getElementById('contentCount').textContent=`${f.length} وظيفة متاحة — القطاع الخاص`;
  updCounts();
}

function updCounts(){
  document.getElementById('cnt-all').textContent=allJobs.length;
  CATS.forEach(c=>{const el=document.getElementById('cnt-'+c);if(el)el.textContent=allJobs.filter(j=>j.cat===c).length;});
  document.getElementById('liveCount').textContent=allJobs.length;
  Object.keys(SRC).forEach(s=>{
    const el=document.getElementById('src-'+s.replace(/ /g,'_'));
    if(el)el.textContent=allJobs.filter(j=>j.src===s).length;
  });
  document.getElementById('statTotal').textContent=totalAdsEver;
  document.getElementById('statPages').textContent=pageIdx;
}

function sortJ(s,btn){
  curSort=s;
  document.querySelectorAll('.sb2').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterJobs();
}

async function cp(el,text){
  try{await navigator.clipboard.writeText(text);}
  catch{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
  el.classList.add('copied');
  setTimeout(()=>el.classList.remove('copied'),1800);
  toast('📋 تم نسخ: '+text);
}

function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── TIMER ──
function startTimer(){
  cd=60;updTimer();clearInterval(timerInt);
  timerInt=setInterval(()=>{cd--;updTimer();if(cd<=0)refresh();},1000);
}
function updTimer(){
  document.getElementById('timerNum').textContent=cd;
  document.getElementById('timerRing').style.strokeDashoffset=C*(1-cd/60);
}

// ── REFRESH — يضيف الإعلانات الجديدة فوق القديمة ──
function refresh(){
  const newBatch = genBatch(16);
  totalAdsEver += newBatch.length;

  // أضف الجديدة في الأول
  allJobs = [...newBatch, ...allJobs];

  // أرشفة إذا تجاوزنا الحد
  if(allJobs.length > MAX_POOL){
    const overflow = allJobs.splice(MAX_POOL);
    archivedPages.unshift({jobs: overflow, time: new Date(), page: pageIdx+1});
    pageIdx++;
    if(archivedPages.length > 15) archivedPages.pop();
    buildArchive();
  }

  filterJobs();
  savePool(allJobs, archivedPages, pageIdx, totalAdsEver);
  document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
  toast('🔄 أُضيف '+newBatch.length+' إعلان جديد — المجموع: '+allJobs.length);
  startTimer();
}

function manualRefresh(){refresh();}

function buildArchive(){
  const sec=document.getElementById('arcSec'),tabs=document.getElementById('pageTabs'),grid=document.getElementById('archiveGrid');
  if(!archivedPages.length){sec.style.display='none';return;}
  sec.style.display='block';
  tabs.innerHTML=archivedPages.map((p,i)=>`<button class="ptab ${i===0?'active':''}" onclick="showArc(${i},this)">دفعة ${p.page} — ${p.time.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}</button>`).join('');
  render(archivedPages[0].jobs,grid);
}
function showArc(i,btn){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(archivedPages[i].jobs,document.getElementById('archiveGrid'));
}

// ── INIT — تحميل البيانات المحفوظة ──
buildSources();

const saved = loadPool();
if(saved.jobs.length > 0){
  allJobs = saved.jobs;
  archivedPages = saved.archived;
  pageIdx = saved.pageIdx;
  totalAdsEver = saved.totalEver;
  toast('📂 تم استعادة '+allJobs.length+' إعلان محفوظ');
} else {
  allJobs = genBatch(16);
  totalAdsEver = allJobs.length;
  savePool(allJobs, [], 0, totalAdsEver);
}

filterJobs();
buildArchive();
document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
startTimer();
</script>
